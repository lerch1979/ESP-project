server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App shell — MUST always revalidate. Without this, browsers heuristically
    # cache index.html and keep pointing at old chunk hashes that 404 after a
    # deploy → "Failed to fetch dynamically imported module" crash. index.html
    # is tiny and references content-hashed assets, so no-cache is cheap.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Service-worker + PWA control files must never be cached, so a new deploy's
    # SW is detected promptly (and can then evict the stale precached shell).
    # NOTE: must precede the immutable-assets regex below — first match wins.
    location ~* (^|/)(sw\.js|registerSW\.js|workbox-[^/]+\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Content-hashed build assets — safe to cache forever (the hash changes when
    # the content does). Single clean Cache-Control header.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA routing — all other routes fall back to the (no-cache) shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
