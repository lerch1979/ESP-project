name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hr_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'hr-erp backend/hr-erp-backend/package-lock.json'

    - name: Install dependencies
      run: cd "hr-erp backend/hr-erp-backend" && npm ci

    - name: Run database migrations
      # CI's postgres service is a fresh empty DB. Without running migrations,
      # integration tests hit controllers whose SQL queries error out → 500
      # instead of the expected 401/404. The backend reads DB_HOST/DB_NAME/
      # DB_USER/DB_PASSWORD (not DATABASE_URL) — keep both in sync.
      run: cd "hr-erp backend/hr-erp-backend" && npm run db:migrate
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:test@localhost:5432/hr_erp_test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: hr_erp_test
        DB_USER: postgres
        DB_PASSWORD: test

    - name: Run tests
      run: cd "hr-erp backend/hr-erp-backend" && npm test
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:test@localhost:5432/hr_erp_test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: hr_erp_test
        DB_USER: postgres
        DB_PASSWORD: test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: './hr-erp backend/hr-erp-backend'
            image_suffix: backend
          - context: './hr-erp-admin'
            image_suffix: admin

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push ${{ matrix.image_suffix }}
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image_suffix }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image_suffix }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

    - name: Update image tags
      run: |
        cd k8s
        sed -i "s|hr-erp-backend:latest|hr-erp-backend:${{ github.sha }}|g" backend-deployment.yaml
        sed -i "s|hr-erp-admin:latest|hr-erp-admin:${{ github.sha }}|g" admin-deployment.yaml

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/persistent-volumes.yaml
        kubectl apply -f k8s/postgres-deployment.yaml
        kubectl apply -f k8s/redis-deployment.yaml
        kubectl apply -f k8s/backend-deployment.yaml
        kubectl apply -f k8s/admin-deployment.yaml
        kubectl apply -f k8s/ingress.yaml
        kubectl apply -f k8s/network-policy.yaml

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/backend -n hr-erp-production --timeout=300s
        kubectl rollout status deployment/admin -n hr-erp-production --timeout=300s

    - name: Verify deployment
      run: |
        kubectl get pods -n hr-erp-production
        kubectl get services -n hr-erp-production
