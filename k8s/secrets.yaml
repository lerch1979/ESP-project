apiVersion: v1
kind: Secret
metadata:
  name: hr-erp-secrets
  namespace: hr-erp-production
type: Opaque
stringData:
  # IMPORTANT: Replace these values before deploying!
  # Use: kubectl create secret generic hr-erp-secrets --from-env-file=.env -n hr-erp-production
  DATABASE_URL: "postgresql://hr_erp_user:CHANGE_ME@postgres-service:5432/hr_erp"
  JWT_SECRET: "CHANGE_ME_TO_128_CHAR_RANDOM_HEX"
  DB_PASSWORD: "CHANGE_ME"
