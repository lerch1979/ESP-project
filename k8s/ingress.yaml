apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hr-erp-ingress
  namespace: hr-erp-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit-connections: "100"
    nginx.ingress.kubernetes.io/rate-limit-rps: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.hr-erp.housingsolutions.hu
    - app.hr-erp.housingsolutions.hu
    secretName: hr-erp-tls
  rules:
  - host: api.hr-erp.housingsolutions.hu
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3001
  - host: app.hr-erp.housingsolutions.hu
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-service
            port:
              number: 80
