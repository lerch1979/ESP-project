services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hr_erp
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    image: ghcr.io/lerch1979/esp-project-backend:latest
    env_file: ./.env.production
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hr_erp
      DB_USER: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    volumes:
      - uploads_data:/app/uploads
      - backend_logs:/app/logs
    # Override the image healthcheck: it probed http://localhost:3001/health,
    # which the prod security middleware 301s to https (no X-Forwarded-Proto) ->
    # wget tried TLS on the plaintext port and the check failed (false negative).
    # Use IPv4 loopback + X-Forwarded-Proto so the app treats it as secure -> 200.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --header='X-Forwarded-Proto: https' http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  admin:
    image: ghcr.io/lerch1979/esp-project-admin:latest
    depends_on: [backend]
    # Override the image healthcheck: it probed http://localhost:80/, but
    # localhost resolved to IPv6 [::1] while nginx listens on IPv4 only ->
    # connection refused (false negative). Pin the probe to IPv4 loopback.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend, admin]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  backend_logs:
  caddy_data:
  caddy_config:
